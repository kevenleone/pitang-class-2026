version: '3.8'

services:
    postgres:
        image: postgres:16-alpine
        container_name: pitang-postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: pitang
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data

    redis:
        image: redis:7-alpine
        container_name: pitang-redis
        restart: unless-stopped
        ports:
            - '6379:6379'
        volumes:
            - redis_data:/data

    postgres-test:
        image: postgres:16-alpine
        container_name: pitang-postgres-test
        restart: unless-stopped
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: pitang_test
        ports:
            - '5433:5432'

volumes:
    postgres_data:
    redis_data:
